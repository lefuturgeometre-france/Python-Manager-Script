<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Logs - {{ name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: #1e1e1e; color: #dcdcdc; font-family: monospace; padding: 20px;">
    <div class="d-flex justify-content-between border-bottom border-secondary pb-2 mb-3">
        <h4>Logs: {{ name }}</h4>
        <a href="/" class="btn btn-sm btn-outline-light">Retour</a>
    </div>
    <pre id="log-content" style="white-space: pre-wrap;">Chargement...</pre>
    <script>
        function fetchLogs() {
            fetch('/raw_logs/{{ sid }}').then(r => r.text()).then(d => {
                const c = document.getElementById('log-content');
                if (c.innerText !== d) { 
                    c.innerText = d; 
                    window.scrollTo(0, document.body.scrollHeight); 
                }
            });
        }
        setInterval(fetchLogs, 2000); 
        fetchLogs();
    </script>
</body>
</html>
